<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="EVSmart+ connects EV drivers, ambulance responders, nearby EV workshop support, and insurance analytics through realtime accident intelligence.">
  <meta name="theme-color" content="#2E7D32">

  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="EVSmart+">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="apple-touch-icon" sizes="512x512" href="icons/Icon-512.png">

  <link rel="icon" type="image/png" href="icon.png"/>
  <link rel="manifest" href="manifest.json">

  <title>EVSmart+ Emergency Assistance</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #F3F4F6;
      font-family: Arial, sans-serif;
    }

    #loading-shell {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #F3F4F6;
      color: #1B5E20;
      z-index: 9999;
    }

    #loading-card {
      text-align: center;
      padding: 18px 22px;
      border-radius: 20px;
      background: rgba(255,255,255,0.96);
      box-shadow: 0 16px 36px rgba(46, 125, 50, 0.12);
      min-width: 190px;
    }

    #update-banner {
      display: none;
      position: fixed;
      right: 16px;
      bottom: 16px;
      z-index: 10000;
      background: #1B5E20;
      color: white;
      padding: 14px 16px;
      border-radius: 16px;
      box-shadow: 0 12px 30px rgba(0,0,0,0.18);
      max-width: 320px;
    }

    #update-banner button {
      margin-top: 10px;
      border: 0;
      border-radius: 999px;
      padding: 8px 14px;
      background: white;
      color: #1B5E20;
      font-weight: 700;
      cursor: pointer;
    }

  </style>
</head>
<body>
  <div id="loading-shell">
    <div id="loading-card">
      <div style="font-size: 28px; font-weight: 800; letter-spacing: 0.3px;">EVSmart+</div>
      <div style="margin-top: 8px; color: #4F6B53;">Starting dashboard...</div>
    </div>
  </div>

  <div id="update-banner">
    A new EVSmart+ web version is ready.
    <div><button id="update-button">Refresh now</button></div>
  </div>

  <script>
    window.addEventListener('load', function () {
      const loadingShell = document.getElementById('loading-shell');
      const updateBanner = document.getElementById('update-banner');
      const updateButton = document.getElementById('update-button');
      let waitingWorker = null;

      function showUpdate(worker) {
        waitingWorker = worker;
        updateBanner.style.display = 'block';
      }

      updateButton.addEventListener('click', function () {
        if (waitingWorker) {
          waitingWorker.postMessage({ type: 'SKIP_WAITING' });
        }
      });

      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.addEventListener('controllerchange', function () {
          window.location.reload();
        });

        navigator.serviceWorker.getRegistration().then(function (registration) {
          if (!registration) {
            return;
          }
          if (registration.waiting) {
            showUpdate(registration.waiting);
          }
          registration.addEventListener('updatefound', function () {
            const installingWorker = registration.installing;
            if (!installingWorker) {
              return;
            }
            installingWorker.addEventListener('statechange', function () {
              if (installingWorker.state === 'installed' && navigator.serviceWorker.controller) {
                showUpdate(installingWorker);
              }
            });
          });
        });
      }

      window.addEventListener('flutter-first-frame', function () {
        if (loadingShell) {
          loadingShell.remove();
        }
      });
    });
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
