name: evsmart_plus
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  firebase_core: ^2.25.4
  firebase_auth: ^4.17.4
  firebase_database: ^10.4.4
  shared_preferences: ^2.2.2
  image_picker: ^1.0.7
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  geolocator: ^10.1.0
  google_maps_flutter: ^2.14.2
  url_launcher: ^6.2.5
  sensors_plus: ^6.1.1
  http: ^1.2.2
  flutter_tts: ^4.0.2
  local_auth: ^2.3.0
  firebase_messaging: ^14.9.4
  flutter_local_notifications: ^17.2.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.13.1
  flutter_lints: ^6.0.0

flutter_launcher_icons:
  color: "#FFFFFF"
  android: true
  ios: true
  image_path: "assets/images/icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
